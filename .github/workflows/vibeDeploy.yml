name: Deploy Rails App (Passenger)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VIBESSH }}

      - name: Deploy to Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.VIBEIP }} << 'EOF'
            # ---- LOAD ASDF ----
            . $HOME/.asdf/asdf.sh
            . $HOME/.asdf/completions/asdf.bash

            echo "Ruby:"
            ruby -v
            echo "Bundler:"
            bundle -v

            cd /var/www/html/vibe/tasklist || exit 1
            git pull origin master || exit 1

            bundle install || exit 1
            rails db:migrate || exit 1

            echo "✅ Deployment complete - For Vibecopilot"
          EOF
